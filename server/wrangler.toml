name = "app-server"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "app-db"
database_id = "" # Set after running: wrangler d1 create app-db

[vars]
BETTER_AUTH_SECRET = "" # Set in .dev.vars for local dev
BETTER_AUTH_URL = "http://localhost:8787"
